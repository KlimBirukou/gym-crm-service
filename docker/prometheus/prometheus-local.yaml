global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'gym-crm'
    environment: 'local'

scrape_configs:
  - job_name: 'gym-application'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: [ 'host.docker.internal:8080' ]
        labels:
          application: 'gym-crm'
          service: 'backend'

  - job_name: 'prometheus'
    static_configs:
      - targets: [ 'localhost:9090' ]
