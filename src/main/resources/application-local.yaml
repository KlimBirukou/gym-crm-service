spring:
  application:
    name: gym-crm-server
  cloud:
    config:
      enabled: false
    openfeign:
      client:
        config:
          gym-auth-server:
            url: http://localhost:8083
          gym-workload-server:
            url: http://localhost:8082
  output:
    ansi:
      enabled: always
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:postgresql://localhost:5432/gym_crm_database?currentSchema=gym_crm_schema
    username: gym_crm_user
    password: vG8k2Pz9mN4Xw7Tq
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: gym_crm_schema
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 20
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/main-changelog.yaml
    default-schema: gym_crm_schema
    contexts: default,seed

server:
  port: 8094

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: false
    instance-id: ${spring.application.name}:localhost:${server.port}
    hostname: localhost
    non-secure-port: ${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

application:
  request-uid:
    header-name: "X-Request-Uid"
    mdc-key: "requestUid"
  internal:
    secret: AUTH_SECRET_SUPER_PUPER_SECRET_ULTRA_MAX_FOREVER_SECRET
    header-name: "X-Internal-Secret"
  security:
    endpoints:
      public-endpoints:
        - "/api/v1/auth/registration/trainee"
        - "/api/v1/auth/registration/trainer"
        - "/api/v1/auth/login"
        - "/actuator/**"
        - "/swagger-ui/**"
        - "/swagger-ui.html"
        - "/v3/api-docs/**"
  user:
    username-delimiter: "."
  swagger:
    server-url: "http://localhost:8094"
    server-description: "Local development server"

resilience4j:
  circuitbreaker:
    instances:
      workloadService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true

logging:
  level:
    root: WARN
    com.epam.gym: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    feign: DEBUG
  pattern:
    correlation: "[${spring.application.name:},%X{requestUid:-}] "
    console: "%clr([){faint}%clr(${spring.application.name:}){cyan}%clr( : ){faint}%clr(%X{requestUid:-}){magenta}%clr(]){faint} %clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%-5level) %clr([%thread]){faint} %clr(%logger{36}){cyan} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
