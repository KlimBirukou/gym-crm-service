spring:
  docker:
    compose:
      file: compose.local.yaml
      lifecycle-management: start-only

  datasource:
    url: jdbc:postgresql://localhost:5432/gym_db?currentSchema=gym_schema
    username: gym_user
    password: vG8k2Pz9mN4Xw7Tq

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    contexts: default,seed

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  info:
    env:
      enabled: true

logging:
  level:
    root: INFO
    com.epam.gym: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true

application:
  auth:
    secret: bG9jYWwtc2VjcmV0LWtleS1mb3ItZ3ltLWNybS1hcHAtbG9jYWwtZGV2ZWxvcG1lbnQ=
  swagger:
    server-url: "http://localhost:8080"
    server-description: "Local development server"

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
