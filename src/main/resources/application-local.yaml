spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gym_db?currentSchema=gym_schema
    username: gym_user
    password: vG8k2Pz9mN4Xw7Tq

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    contexts: default,seed

logging:
  level:
    root: INFO
    com.epam.gym: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

springdoc:
  api-docs:
    enabled: true
  show-actuator: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true
