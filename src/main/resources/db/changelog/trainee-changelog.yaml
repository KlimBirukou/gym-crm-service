databaseChangeLog:
  - changeSet:
      id: 2026-02-04-02
      author: Klim Birukou <klim_birukou@epam.com>
      changes:
        - createTable:
            tableName: trainee
            schemaName: gym_schema
            remarks: Create table for storing trainees
            columns:
              - column:
                  name: uid
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_trainee
              - column:
                  name: address
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: birthdate
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: user_uid
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_trainee_to_user
                    references: gym_schema.user(uid)
