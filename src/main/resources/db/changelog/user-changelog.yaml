databaseChangeLog:
  - changeSet:
      id: 2026-02-04-01
      author: Klim Birukou <klim_birukou@epam.com>
      changes:
        - createTable:
            tableName: user
            schemaName: gym_crm_schema
            remarks: Stores common user information for trainers and trainees
            columns:
              - column:
                  name: uid
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_user
                    nullable: false
              - column:
                  name: first_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: username
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_user_username
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: boolean
                  constraints:
                    nullable: false
