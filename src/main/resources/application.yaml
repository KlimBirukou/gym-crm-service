spring:
  application:
    name: gym
  validation:
    trainee:
      min-years: 18
      max-years: 100
    training:
      min-days: 1
      max-month: 3

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


storage:
  data:
    trainee:
      file: classpath:data/trainee.json
    trainer:
      file: classpath:data/trainer.json
    training:
      file: classpath:data/training.json
