# Application
spring:
  output:
    ansi:
      enabled: always
  application:
    name: gym

  # Json
  jackson:
    property-naming-strategy: SNAKE_CASE

  # Database
  datasource:
    url: jdbc:postgresql://localhost:5432/gym_db?currentSchema=gym_schema
    username: gym_user
    password: HXGLca@\X$@9I$K
    driver-class-name: org.postgresql.Driver

  # JPA/Hibernate
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: gym_schema
        jdbc:
          lob:
            non_contextual_creation: true
      order_inserts: true
      order_updates: true
      batch_size: 20

  # Liquibase
  liquibase:
    default-schema: gym_schema
    change-log: classpath:db/changelog/main-changelog.yaml
    enabled: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
  info:
    env:
      enabled: true

# Logging
logging:
  level:
    root: INFO
    com.epam.gym: DEBUG
    org.hibernate.SQL: ERROR
    org.hibernate.type.descriptor.sql.BasicBinder: ERROR
  pattern:
    correlation: "[${spring.application.name:},%X{requestUid:-}] "
    console: "%clr([){faint}%clr(${spring.application.name:}){cyan}%clr( : ){faint}%clr(%X{requestUid:-}){magenta}%clr(]){faint} %clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%-5level) %clr([%thread]){faint} %clr(%logger{36}){cyan} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# Swagger/OpenApi
springdoc:
  show-actuator: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true

gym:
