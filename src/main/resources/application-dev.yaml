spring:
  datasource:
    url: jdbc:postgresql://gym-db:5432/gym_db?currentSchema=gym_schema
    username: gym_user
    password: vG8k2Pz9mN4Xw7Tq

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: false

  liquibase:
    contexts: default,seed

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
    tags:
      application: ${spring.application.name}
  info:
    env:
      enabled: true

logging:
  level:
    root: INFO
    com.epam.gym: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: OFF

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true

application:
  auth:
    secret: ZGV2LXNlY3JldC1rZXktZm9yLWd5bS1jcm0tYXBwLWRldmVsb3BtZW50LW9ubHk=
