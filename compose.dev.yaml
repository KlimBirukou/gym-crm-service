name: gym

services:
  gym-crm-database:
    container_name: gym-crm-postgres
    build:
      context: .
      dockerfile: docker/database/Dockerfile
    environment:
      - POSTGRES_DB=gym_crm_database
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
    ports:
      - "5432:5432"
    volumes:
      - gym_crm_database_volumes:/var/lib/postgresql
    networks:
      - gym-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d gym_crm_database" ]
      interval: 5s
      timeout: 5s
      retries: 5

  gym-crm-server:
    container_name: gym-crm-server
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    networks:
      - gym-shared-network
    depends_on:
      gym-crm-database:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8084/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  gym-network:
    external: true

volumes:
  gym_crm_database_volumes:
